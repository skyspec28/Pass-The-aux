services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: passtheaux
      POSTGRES_PASSWORD: passtheaux
      POSTGRES_DB: passtheaux
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U passtheaux"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://passtheaux:passtheaux@postgres:5432/passtheaux
      TEST_DATABASE_URL: postgresql+asyncpg://passtheaux:passtheaux@postgres:5432/passtheaux_test
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-change-in-prod
    ports:
      - "8080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/code
    working_dir: /code

  worker:
    build: .
    command: arq app.workers.settings.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://passtheaux:passtheaux@postgres:5432/passtheaux
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/code
    working_dir: /code

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/v1
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
